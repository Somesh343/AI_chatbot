<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai_chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-container">

        <!-- user message -->

        <div class="user-chatbox">

        </div>

        <!-- ai message -->

        <div class="ai-chatbox">
            <img src="ai.png" alt="" id="ai-image" width="10%">
            <div class="ai_chat-area">
                Hello ! how can i help you today?
            </div>
        </div>
    </div>

    <div class="prompt-area">
        <input type="text" id="prompt" placeholder="Message...">
        <button id="image"> <img src="img.svg" alt="">
        <input type="file" accept="image/*" hidden></button>
        <button id="submit"> <img src="submit.svg" alt=""></button>
    </div>
    <script src="script.js"></script>
</body>

</html>
